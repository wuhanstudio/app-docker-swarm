# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ROOT_DOMAIN_VAR: wuhanstudio.click

env:
  ROOT_DOMAIN: '{{.ROOT_DOMAIN_VAR}}'

tasks:
  maze:
    desc: Install maze application
    cmds:
      - docker pull wuhanstudio/maze-2.5d:latest
      - docker stack deploy -c maze-compose.yml maze

  status:
    desc: Check deployment status
    cmds:
      - docker stack ls
      - docker service ls
      - docker container exec -it `docker ps | grep -o traefik_traefik.*` cat /letsencrypt/acme.json | grep {{.ROOT_DOMAIN_VAR}}

  uninstall:
    desc: Uninstall maze application
    cmds:
      - docker stack rm maze

version: '3.3'

services:
 # The error pages server
 error:
   image: nginx:stable-alpine
   networks:
     - traefik_public
   volumes:
     - ./error-pages:/usr/share/nginx/html
     - ./error.conf:/etc/nginx/conf.d/default.conf
   deploy:
     labels:
       - 'traefik.enable=true'
       - 'traefik.http.routers.catchall.rule=HostRegexp(`.*\.${ROOT_DOMAIN}`)'
       - 'traefik.http.routers.catchall.entrypoints=websecure,web'
       - 'traefik.http.routers.catchall.priority=1'
       - 'traefik.http.routers.catchall.middlewares=https-to-http,error-pages-middleware'
       - 'traefik.http.middlewares.error-pages-middleware.errors.status=404'
       - 'traefik.http.middlewares.error-pages-middleware.errors.service=error'
       - 'traefik.http.middlewares.error-pages-middleware.errors.query=/{status}.html'
       - 'traefik.http.services.error.loadbalancer.server.port=80'

       # Middleware: HTTPS → HTTP
       - "traefik.http.middlewares.https-to-http.redirectscheme.scheme=http"
       - "traefik.http.middlewares.https-to-http.redirectscheme.permanent=false"

networks:
  traefik_public:
    external: true

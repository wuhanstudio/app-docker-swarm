# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ROOT_DOMAIN_VAR: wuhanstudio.click

env:
  ROOT_DOMAIN: '{{.ROOT_DOMAIN_VAR}}'

tasks:
  womginx:
    desc: Install womginx application (VPN)
    cmds:
      - docker pull wuhanstudio/womginx:latest
      - docker stack deploy -c x-compose.yml womginx

  status:
    desc: Check deployment status
    cmds:
      - docker stack ls
      - docker service ls
      - docker container exec -it `docker ps | grep -o traefik_traefik.*` cat /letsencrypt/acme.json | grep {{.ROOT_DOMAIN_VAR}}

  uninstall:
    desc: Uninstall womginx application
    cmds:
      - docker stack rm womginx


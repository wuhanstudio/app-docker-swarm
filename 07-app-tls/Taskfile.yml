# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ROOT_DOMAIN_VAR: wuhanstudio.click

env:
  ROOT_DOMAIN: '{{.ROOT_DOMAIN_VAR}}'

tasks:
  app:
    desc: Install app application
    cmds:
      - docker pull nginx:stable-alpine
      - envsubst < app.temp > app.conf
      - docker stack deploy -c app-compose.yml app

  status:
    desc: Check deployment status
    cmds:
      - docker stack ls
      - docker service ls
      - docker container exec -it `docker ps | grep -o traefik_traefik.*` cat /letsencrypt/acme.json | grep {{.ROOT_DOMAIN_VAR}}

  uninstall:
    desc: Uninstall app application
    cmds:
      - docker stack rm app

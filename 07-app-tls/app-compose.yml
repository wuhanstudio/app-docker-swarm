version: '3'
services:
  app:
    image: nginx:stable-alpine
    networks:
     - traefik_public
    volumes:
     - ./app:/usr/share/nginx/html
     - ./app.conf:/etc/nginx/conf.d/default.conf
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.app.rule=Host(`app.${ROOT_DOMAIN}`)"
        - "traefik.http.routers.app.entrypoints=web"
        - "traefik.http.services.app.loadbalancer.server.port=80"
        # TLS
        - "traefik.http.routers.apps.rule=Host(`app.${ROOT_DOMAIN}`)"
        - "traefik.http.routers.apps.entrypoints=websecure"
        - "traefik.http.routers.apps.tls.certresolver=myhttpchallenge"
        # Redirect
        - "traefik.http.routers.app.middlewares=https_redirect"
        - "traefik.http.middlewares.https_redirect.redirectscheme.scheme=https"
networks:
  traefik_public:
    external: true


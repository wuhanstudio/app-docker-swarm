# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ROOT_DOMAIN_VAR: wuhanstudio.click
  WG_PORT_VAR: 11970

env:
  ROOT_DOMAIN: '{{.ROOT_DOMAIN_VAR}}'
  WG_PORT:     '{{.WG_PORT_VAR}}'

tasks:
  wg:
    desc: WireGuard service
    dir: "wg-easy"
    cmds:
      - docker pull ghcr.io/wg-easy/wg-easy:15
      - docker pull nginx:stable-alpine
      - docker compose up -d
      - cd ..
      - envsubst '$ROOT_DOMAIN' < nginx-wg.conf > nginx.conf
      - docker stack deploy -c ../wg-compose.yaml wg

  status:
    desc: Check deployment status
    cmds:
      - docker stack ls
      - docker service ls
      - docker container exec -it `docker ps | grep -o traefik_traefik.*` cat /letsencrypt/acme.json | grep {{.ROOT_DOMAIN_VAR}}

  uninstall:
    desc: Uninstall wireguard application
    dir: "wg-easy"
    cmds:
      - docker stack rm wg
      - docker compose down

version: '3'
services:
  whoami:
    image: traefik/whoami:v1.10
    networks:
     - traefik_public
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.whoami.rule=Host(`hello.${ROOT_DOMAIN}`) && PathPrefix(`/whoami`)"
        - "traefik.http.middlewares.whoamipathstrip.stripprefix.prefixes=/whoami"
        - "traefik.http.routers.whoami.entrypoints=web"
        - "traefik.http.services.whoami.loadbalancer.server.port=80"
        # TLS
        - "traefik.http.routers.whoamis.rule=Host(`hello.${ROOT_DOMAIN}`) && PathPrefix(`/whoami`)"
        - "traefik.http.middlewares.whoamipathstrips.stripprefix.prefixes=/whoami"
        - "traefik.http.routers.whoamis.entrypoints=websecure"
        - "traefik.http.routers.whoamis.tls.certresolver=myhttpchallenge"
        # Redirect
        - "traefik.http.routers.whoami.middlewares=https_redirect"
        - "traefik.http.middlewares.https_redirect.redirectscheme.scheme=https"
networks:
  traefik_public:
    external: true

# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ROOT_DOMAIN_VAR: wuhanstudio.click

env:
  ROOT_DOMAIN: '{{.ROOT_DOMAIN_VAR}}'

tasks:
  whoami:
    desc: Install whoami application
    cmds:
      - docker pull traefik/whoami:v1.10
      - docker stack deploy -c whoami-compose.yml whoami

  status:
    desc: Check deployment status
    cmds:
      - docker stack ls
      - docker service ls
      - docker container exec -it `docker ps | grep -o traefik_traefik.*` cat /letsencrypt/acme.json | grep {{.ROOT_DOMAIN_VAR}}

  uninstall:
    desc: Uninstall whoami application
    cmds:
      - docker stack rm whoami
